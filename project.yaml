 #-------end of monthly dataset actions
 
  # 1.Real data and measures 
  generate_dataset_arnaud:
    run: ehrql:v1 generate-dataset analysis/dataset_definition_patients_Arnaud.py --output results_Arnaud/dataset_Arnaud.csv
    outputs:
      highly_sensitive:   # individual data are highly sensitive.
        dataset: results_Arnaud/dataset_Arnaud.csv

  generate_measures_Arnaud:
    run: ehrql:v1 generate-measures analysis/dataset_definition_patients_measures_Arnaud.py --output output/data_patients_measures_Arnaud.csv
    outputs:
      moderately_sensitive:  # measures are moderately senstive.
        measures: output/data_patients_measures_Arnaud.csv

           # 2.Dummy data and measures 
  generate_dummy_dataset_Arnaud:
    run: ehrql:v1 generate-dataset analysis/dataset_definition_patients_Arnaud.py --dummy-tables dummy-folder --output results_Arnaud/dummy_dataset_Arnaud.csv
    outputs:
      highly_sensitive:   # individual data are highly sensitive.
        dataset: results_Arnaud/dummy_dataset_Arnaud.csv

  generate_dummy_measures_Arnaud:
    run: ehrql:v1 generate-measures analysis/dataset_definition_patients_measures_Arnaud.py --dummy-tables dummy-folder --output results_Arnaud/dummy_measures_Arnaud.csv
    outputs:
      moderately_sensitive:  # measures are moderately senstive.
        measures: results_Arnaud/dummy_measures_Arnaud.csv
 # 3.Analysis with dummy data
  generate_missingness_dataset_Arnaud:
    run: r:v2 results_Arnaud/missingness_dataset_Arnaud.R
    needs: [generate_dataset_arnaud]
    outputs:
      moderately_sensitive:
        chart: results_Arnaud/missingness_dataset_Arnaud.png

  generate_uti_prescribing_rate:
    run: r:v2 results_Arnaud/uti_prescribing_rate.R
    needs: [generate_dummy_measures_Arnaud]
    outputs:
      moderately_sensitive:
        chart: results_Arnaud/uti_prescribing_rate.png

  generate_age:
    run: r:v2 results_Arnaud/age.R
    needs: [generate_dummy_dataset_Arnaud]
    outputs:
      moderately_sensitive:
        chart: results_Arnaud/age.png
  
  generate_imd:
    run: r:v2 results_Arnaud/imd.R
    needs: [generate_dummy_dataset_Arnaud]
    outputs:
      moderately_sensitive:
        chart: results_Arnaud/imd.png

  generate_medications_vol_uti:
    run: r:v2 results_Arnaud/medications_vol_uti.R
    needs: [generate_dummy_dataset_Arnaud] #remember Arnaud instead arnaud
    outputs:
      moderately_sensitive:
        chart: results_Arnaud/medications_vol_uti.png
  
